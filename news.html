<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vinley Global Ltd | News</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/styles.css" />

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    ></script>
  </head>

  <body data-page="news">
    <div id="header"></div>

    <main class="section">
      <div class="container">
        <div class="section-head premium-section-head premium-page-head">
          <span class="section-eyebrow">Vinley Global Ltd</span>
          <h1>News & Updates</h1>
          <p>
            Follow Vinley Global news, project milestones, announcements,
            partnerships, and corporate updates across our service areas.
          </p>
        </div>

        <section class="featured-news-section" data-featured-news></section>

        <section class="news-toolbar">
          <div class="news-toolbar-left">
            <label for="newsFilter" class="muted small news-filter-label">
              Filter:
            </label>

            <select id="newsFilter" class="form-select news-filter-select">
              <option value="all">All categories</option>
            </select>

            <input
              type="text"
              id="newsSearch"
              class="form-control news-search-input"
              placeholder="Search news..."
            />
          </div>

          <div class="muted small news-filter-hint" id="newsFilterHint">
            Showing the latest updates across all categories.
          </div>
        </section>

        <section class="news-grid-section">
          <div
            class="premium-content-grid premium-content-grid-3 news-grid"
            data-news
          ></div>

          <div class="news-load-more" data-news-load-more></div>

          <p class="muted small" data-error role="status"></p>
        </section>
      </div>
    </main>

    <div id="footer"></div>

    <script type="module" src="/assets/js/main.js"></script>
    <script type="module" src="/assets/js/news.page.js"></script>
  </body>
</html>
